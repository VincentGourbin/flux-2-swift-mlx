# LoRA Training Config — Auto-generated by evaluate-lora
# Scene gap: HIGH (0/10), Style gap: LOW (9/10) → 750 steps, rank 32, content sampling

model:
  name: klein-4b
  quantization: bf16

lora:
  rank: 32
  alpha: 32.0
  target_layers: all

training:
  batch_size: 1
  max_steps: 750
  warmup_steps: 75
  learning_rate: 0.0001
  weight_decay: 0.0001

loss:
  weighting: bell_shaped
  timestep_sampling: content
  diff_output_preservation: true
  diff_output_preservation_class: "object"
  diff_output_preservation_multiplier: 1.0

memory:
  gradient_checkpointing: false
  cache_latents: true
  cache_text_embeddings: true
  bucketing:
    enabled: true
    resolutions: [512, 768]

dataset:
  path: ./dataset
  trigger_word: xyz_cat