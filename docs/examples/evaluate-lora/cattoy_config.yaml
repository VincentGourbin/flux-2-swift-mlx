# LoRA Training Config — Auto-generated by evaluate-lora
# Scene gap: LOW (9/10), Style gap: LOW (8/10) → 150 steps, rank 8, balanced sampling

model:
  name: klein-4b
  quantization: bf16

lora:
  rank: 8
  alpha: 8.0
  target_layers: all

training:
  batch_size: 1
  max_steps: 150
  warmup_steps: 15
  learning_rate: 0.0001
  weight_decay: 0.0001

loss:
  weighting: bell_shaped
  timestep_sampling: balanced

memory:
  gradient_checkpointing: false
  cache_latents: true
  cache_text_embeddings: true
  bucketing:
    enabled: true
    resolutions: [512, 768]

dataset:
  path: ./dataset
  trigger_word: sks cat toy